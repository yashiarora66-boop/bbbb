<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bonton Furniture Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #F5F0EA;
    --surface: #FFFFFF;
    --surface2: #EDE8E1;
    --orange: #CC5214;
    --orange-hover: #B8470F;
    --text: #1C1410;
    --muted: #7A6C5D;
    --border-soft: rgba(0,0,0,0.08);
    --shadow: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-hover: 0 6px 20px rgba(204,82,20,0.13);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035; pointer-events: none; z-index: 999;
  }

  body::after {
    content: '';
    position: fixed; top: -25%; left: 50%; transform: translateX(-50%);
    width: 90vw; height: 55vh;
    background: radial-gradient(ellipse, rgba(204,82,20,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .top-rule {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--orange), #E8901A, var(--orange), transparent);
    z-index: 200;
  }

  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 56px 20px 44px;
    gap: 0;
  }

  /* ── IMAGE LOGO ── */
  .logo-wrap {
    animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
    margin-bottom: 28px;
    text-align: center;
  }

  .logo-img {
    width: min(300px, 75vw);
    display: block;
    margin: 0 auto;
  }

  /* ── SECTION DIVIDER ── */
  .section-sep {
    display: flex; align-items: center; gap: 10px;
    width: 100%; max-width: 380px;
    margin: 0 0 14px;
  }
  .section-sep span {
    font-size: 9.5px; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--muted);
    white-space: nowrap; font-weight: 500;
  }
  .section-sep::before, .section-sep::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, rgba(0,0,0,0.1), transparent);
  }

  /* ── ACTION CARDS ── */
  .actions {
    display: flex; flex-direction: column; gap: 9px;
    width: 100%; max-width: 380px;
    margin-bottom: 24px;
    animation: fadeUp 0.8s 0.15s cubic-bezier(0.22,1,0.36,1) both;
  }

  .action-card {
    display: flex; align-items: center; gap: 14px;
    padding: 15px 18px;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    text-decoration: none; color: var(--text);
    transition: all 0.25s ease;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow);
  }

  .action-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--orange);
    transform: scaleY(0); transition: transform 0.25s ease;
    transform-origin: bottom;
  }
  .action-card:hover { transform: translateX(5px); box-shadow: var(--shadow-hover); border-color: rgba(204,82,20,0.2); }
  .action-card:hover::before { transform: scaleY(1); }

  .action-icon {
    width: 40px; height: 40px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2); border: 1px solid var(--border-soft);
    border-radius: 4px;
  }
  .action-icon svg { width: 18px; height: 18px; stroke: var(--orange); fill: none; stroke-width: 1.6; }

  .action-label {
    font-weight: 600; font-size: 12.5px;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .action-sub {
    font-size: 10.5px; color: var(--muted);
    margin-top: 2px; font-weight: 300; letter-spacing: 0.03em;
  }

  .action-arrow {
    margin-left: auto; color: var(--muted); font-size: 14px;
    transition: color 0.25s, transform 0.25s;
  }
  .action-card:hover .action-arrow { color: var(--orange); transform: translateX(3px); }

  /* ── CREATIVE CONTACT GRID ── */
  .connect-section {
    width: 100%; max-width: 380px;
    animation: fadeUp 0.8s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    margin-bottom: 10px;
  }

  .contact-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .contact-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 14px 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    text-decoration: none;
    transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: var(--shadow);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .contact-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: var(--orange);
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 0;
  }
  .contact-btn:hover::after { opacity: 0.06; }
  .contact-btn:hover {
    border-color: rgba(204,82,20,0.35);
    transform: translateY(-4px) scale(1.04);
    box-shadow: 0 8px 22px rgba(204,82,20,0.16);
  }

  .btn-icon-wrap {
    position: relative; z-index: 1;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2);
    border-radius: 50%;
    transition: background 0.25s, transform 0.25s;
  }
  .contact-btn:hover .btn-icon-wrap {
    background: rgba(204,82,20,0.1);
    transform: rotate(-6deg) scale(1.1);
  }

  .btn-icon-wrap svg {
    width: 17px; height: 17px;
    fill: var(--muted);
    transition: fill 0.25s;
  }
  .contact-btn:hover .btn-icon-wrap svg { fill: var(--orange); }

  .contact-btn.stroke .btn-icon-wrap svg {
    fill: none;
    stroke: var(--muted);
    stroke-width: 1.8;
    transition: stroke 0.25s;
  }
  .contact-btn.stroke:hover .btn-icon-wrap svg { stroke: var(--orange); fill: none; }

  .btn-label {
    position: relative; z-index: 1;
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.25s;
  }
  .contact-btn:hover .btn-label { color: var(--orange); }

  /* ── FOOTER ── */
  .footer {
    margin-top: 30px;
    font-size: 9.5px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); opacity: 0.4;
    animation: fadeUp 0.8s 0.45s cubic-bezier(0.22,1,0.36,1) both;
    text-align: center;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 420px) {
    .actions, .connect-section, .section-sep { max-width: 100%; }
    .contact-grid { grid-template-columns: repeat(4, 1fr); gap: 7px; }
  }
</style>
</head>
